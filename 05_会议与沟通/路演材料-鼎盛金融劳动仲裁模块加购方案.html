<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f5f7;
    --card:      #ffffff;
    --text:      #1d1d1f;
    --text-dim:  #86868b;
    --accent:    #0071e3;
    --accent2:   #ff6b35;
    --red:       #e74c3c;
    --green:     #34c759;
    --border:    #e5e5ea;
    --radius:    16px;
    --shadow:    0 4px 24px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    letter-spacing: -0.01em;
  }

  .container {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* ---- Slide ---- */
  .slide {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 80px;
    opacity: 0;
    transition: opacity .45s ease, transform .45s ease;
    transform: translateY(16px);
    pointer-events: none;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .slide.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ---- Cover ---- */
  .slide-cover {
    background: #1d1d1f;
    color: #f5f5f7;
    text-align: center;
    justify-content: center;
    gap: 24px;
  }
  .slide-cover h1 {
    font-size: 52px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2;
  }
  .slide-cover .sub  { font-size: 22px; color: #a1a1a6; font-weight: 400; }
  .slide-cover .meta { font-size: 15px; color: #6e6e73; margin-top: 32px; display: flex; gap: 32px; }

  /* ---- Content slides ---- */
  .slide-content {
    justify-content: center;
    gap: 36px;
  }
  .slide-content h2 {
    font-size: 38px; font-weight: 700; letter-spacing: -0.03em;
    text-align: center; color: var(--text);
  }
  .slide-content h3 {
    font-size: 24px; font-weight: 600; color: var(--text);
  }

  /* ---- Big stat ---- */
  .big-stat {
    font-size: 72px; font-weight: 800; letter-spacing: -0.04em; color: var(--accent);
    line-height: 1;
  }
  .big-stat.negative { color: var(--red); }

  /* ---- Card ---- */
  .card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 32px 36px; max-width: 860px; width: 100%;
  }
  .card-full { max-width: 960px; }
  .card p, .card ul, .card ol { font-size: 17px; line-height: 1.65; color: var(--text); }
  .card ul { padding-left: 20px; }
  .card li { margin-bottom: 8px; }

  /* ---- Horizontal card grid ---- */
  .card-row {
    display: flex; gap: 20px; max-width: 960px; width: 100%;
    flex-wrap: wrap; justify-content: center;
  }
  .card-sm {
    flex: 1; min-width: 200px; max-width: 300px;
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 28px 24px; text-align: center;
  }
  .card-sm .num  { font-size: 44px; font-weight: 700; color: var(--accent); }
  .card-sm .num.red { color: var(--red); }
  .card-sm .lbl  { font-size: 15px; color: var(--text-dim); margin-top: 6px; }

  /* ---- Table ---- */
  table {
    width: 100%; border-collapse: collapse; font-size: 15px;
    border-radius: 12px; overflow: hidden;
  }
  thead { background: #f0f0f2; }
  th { padding: 12px 14px; text-align: center; font-weight: 600; color: var(--text-dim); font-size: 13px; }
  td { padding: 10px 14px; text-align: center; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8f8fa; }
  .highlight-cell { background: #fff3e0; font-weight: 700; border-radius: 4px; }

  /* ---- Quote block ---- */
  .quote {
    border-left: 4px solid var(--accent); padding: 12px 20px;
    font-size: 18px; line-height: 1.7; color: var(--text-dim);
    max-width: 860px; width: 100%;
  }
  .quote strong { color: var(--text); }

  /* ---- Features grid ---- */
  .feature-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    max-width: 960px; width: 100%;
  }
  .feat {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px 20px; text-align: center;
  }
  .feat .icon { font-size: 36px; margin-bottom: 10px; }
  .feat h4   { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .feat p    { font-size: 14px; color: var(--text-dim); }
  .feat .tag { display: inline-block; margin-top: 8px; padding: 4px 12px;
               background: #e8f0fe; color: var(--accent); border-radius: 20px;
               font-size: 13px; font-weight: 600; }

  /* ---- Chart container ---- */
  .chart-wrap {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px; max-width: 960px; width: 100%; text-align: center;
  }
  canvas { display: block; margin: 0 auto; max-width: 100%; }

  /* ---- Nav ---- */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 44px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: rgba(245,245,247,.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    z-index: 100;
  }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border);
    cursor: pointer; transition: all .3s;
  }
  .nav-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
  .nav-hint {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: var(--text-dim); z-index: 99;
    pointer-events: none; transition: opacity .6s;
  }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .slide { padding: 32px 20px; }
    .slide-cover h1 { font-size: 32px; }
    .slide-content h2 { font-size: 26px; }
    .big-stat { font-size: 48px; }
    .feature-grid { grid-template-columns: 1fr 1fr; }
    .card-row { flex-direction: column; }
    table { font-size: 12px; }
    th, td { padding: 6px 4px; }
  }
</style>
</head>

      <p style="font-size:14px;color:var(--text-dim);">覆盖 5 个核心用户<br>演示后 3 天内开通</p>
    </div>
    <div class="card-sm" style="text-align:left;">
      <div style="font-size:36px;margin-bottom:4px;">③</div>
      <h3>签署加购合同</h3>
      <p style="font-size:14px;color:var(--text-dim);">开通 35 套正式授权<br>试用结束后 1 周内</p>
    </div>
  </div>
</div>`);

// Slide 15 – Summary
slides.push(`<div class="slide slide-cover">
  <h1 style="font-size:38px;">总结</h1>
  <div style="max-width:700px;font-size:17px;line-height:1.8;color:#a1a1a6;text-align:left;">

    <p style="margin-bottom:16px;">鼎盛金融 3,500 人的金融机构，每年劳动争议潜在损失约 <strong style="color:var(--accent2);">280 万元</strong>。</p>
    <p style="margin-bottom:16px;">投入 <strong style="color:#f5f5f7;">17.5 万元/年</strong>（35 套），获得全流程用工风险管控，ROI <strong style="color:#34c759;">257%</strong>。</p>
    <p style="font-size:20px;font-weight:600;color:#f5f5f7;margin-top:24px;">
      这不是一笔成本，而是一份保险<br>
      <span style="font-size:16px;color:#a1a1a6;">年费 5,000 元/套 · 对冲单件 8-15 万元风险</span>
    </p>

// ── Render ────────────────────────────────────────
document.getElementById('app').innerHTML = slides.map((s,i) =>
  s.replace('active','')  // strip any preset active
    .replace('<div class="slide','<div class="slide" data-index="'+i+'"')
).join('\n');

document.querySelector('.slide').classList.add('active');

// ── Chart (render after DOM exists) ───────────────
setTimeout(() => {
  const c = document.getElementById('mainChart');
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const pad = { t:28, r:40, b:48, l:52 };
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;

  // grid & axis
  ctx.strokeStyle = '#e5e5ea'; ctx.lineWidth = 0.5;
  for (let i=0; i<=4; i++) {
    const y = pad.t + ph * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle = '#86868b'; ctx.font = '12px -apple-system,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(100-25*i)+'万', pad.l-8, y+4);
  }

  // bars
  const bw = (pw / arbData.length) * 0.6;
  const gap = (pw / arbData.length) * 0.4;
  arbData.forEach((d,i) => {
    const x = pad.l + (pw / arbData.length) * i + gap/2;
    const h = (d.v / 100) * ph;
    const y = pad.t + ph - h;
    // gradient fill
    const grad = ctx.createLinearGradient(x, y, x, pad.t + ph);
    grad.addColorStop(0, '#0071e3'); grad.addColorStop(1, '#40a9ff');
    ctx.fillStyle = grad;
    ctx.beginPath();
    const r = Math.min(4, bw/4);
    ctx.roundRect(x, y, bw, h, [r,r,0,0]);
    ctx.fill();

    // highlight 2008 & 2023
    if (d.y===2008 || d.y===2023) {
      ctx.fillStyle = d.y===2023 ? '#0071e3' : '#ff6b35';
      ctx.font = 'bold 11px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.v+'万', x+bw/2, y-8);
    }
  });

  // x-axis labels (every 3 years)
  ctx.fillStyle = '#86868b'; ctx.font = '11px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  arbData.forEach((d,i) => {
    if (i%3===0) {
      const x = pad.l + (pw / arbData.length) * i + bw/2 + gap/2;
      ctx.fillText(String(d.y), x, H-pad.b+16);
    }
  });
}, 100);

// ── Navigation ────────────────────────────────────
let current = 0;
const total = slides.length;
const slideEls = () => document.querySelectorAll('.slide');
const dots = [];

// Build nav dots
const navBar = document.getElementById('navBar');
for (let i=0; i<total; i++) {
  const d = document.createElement('span');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.addEventListener('click',()=>goTo(i));
  navBar.appendChild(d);
  dots.push(d);
}

function goTo(idx) {
  if (idx<0 || idx>=total) return;
  slideEls().forEach(el=>el.classList.remove('active'));
  slideEls()[idx].classList.add('active');
  dots.forEach(d=>d.classList.remove('active'));
  dots[idx].classList.add('active');
  current = idx;
}

function next() { goTo(current+1); }
function prev() { goTo(current-1); }

document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); next(); }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); prev(); }
});

document.addEventListener('click', e => {
  // Click on nav-dot handled by dot handler
  if (e.target.classList.contains('nav-dot')) return;
  // Click elsewhere advances
  if (e.clientY < window.innerHeight-50) next();
});

// Touch swipe
let touchY = 0;
document.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchY;
  if (dy < -40) next();
  if (dy > 40) prev();
});

// Hide hint after first interaction
let hinted = false;
function hideHint() {
  if (!hinted) { document.getElementById('hint').style.opacity='0'; hinted=true; }
}
document.addEventListener('keydown', hideHint, {once:true});
document.addEventListener('click', hideHint, {once:true});
</script>
